    content: "Yes \u2014 the lesson intends those two emails to have the **same model\
      \ score**. Priya\u2019s point is that identical scores can still mean very different\
      \ things in practice: one is a newsletter someone reads every week, the other\
      \ is credential theft. Same number, different stakes. If that wasn\u2019t obvious\
      \ from the scene, that\u2019s fair; the mechanism only lands once you read \u201C\
      same score from your system\u201D as the hinge of her complaint.\n\nThe score\
      \ comes from **logistic regression on TF-IDF features** \u2014 roughly, word-importance\
      \ weights summed into a spam probability between 0 and 1. That number is the\
      \ model\u2019s internal estimate, not an audited fact. It reflects what the\
      \ model learned from past labeled mail; it can be miscalibrated (overconfident\
      \ on some score ranges, underconfident on others).\n\nYour \u201C99 out of 100\u201D\
      \ reading is exactly the **calibration** question, and it is a major assumption\
      \ \u2014 not a given. A raw 0.99 score only means \u201Cthe model\u2019s math\
      \ says 99%\u201D unless you\u2019ve checked that emails scoring ~0.99 actually\
      \ turn out spam ~99% of the time in held-out or production data. Without that\
      \ check, Legal can\u2019t treat 0.99 as \u201C1 in 100 wrong.\u201D That\u2019\
      s why Priya rejects bare labels: she needs **graded trust tied to observed error\
      \ rates**, not the model\u2019s self-reported certainty. Calibration is the\
      \ bridge between score and \u201Chow much to believe before delete vs. quarantine\
      \ vs. human review\u201D \u2014 and tonight\u2019s lesson stops before proving\
      \ your model crosses it."
