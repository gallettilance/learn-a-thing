background: >
  PhD in data science. Strong applied ML, experimental design, and training-loop
  optimization. Weak formal statistics theory — Bayesian inference beyond basics,
  MCMC diagnostics, variational inference, quadratic programming / KKT,
  measure-theoretic probability.

known_anchors:
  - sklearn workflows (fit/predict, pipelines, cross-validation)
  - PyMC / Stan (used but not deeply understood)
  - SVM and margin-based classifiers
  - Linear models and regularization (ridge, lasso — frequentist framing)
  - Experimental design and A/B testing intuition
  - Gradient-based optimization in neural network training

blind_spots:
  - Bayesian inference (full posterior reasoning, MCMC/VI, not just MAP)
  - Monte Carlo methods (variance reduction, when simulation beats closed form)
  - Stochastic processes (Markov structure, stationarity, ergodicity)
  - Time series (forecasting vs inference, temporal dependence)
  - Linear and quadratic optimization (KKT, duality, constrained QP)
  - Transformers (attention as mechanism, not architecture tour)
  - LLMs (scaling, inference, alignment pressures in production)
  - Quantum computing (qubits, gates, measurement — bridge from linear algebra)

