pedagogy_summary: "Tonight on the same two hundred quarantine emails you earned three\
  \ separable audit clauses Leadership keeps collapsing: holdout accuracy cannot sign\
  \ Product's 0.9 gate (high bin 0.94 claimed versus ~71% observed blocks auto-quarantine),\
  \ folder spam rate updates as prior \u2192 one label \u2192 posterior on 148/52\
  \ \u2192 149/51 without retraining word weights, and Marcus's composition memo does\
  \ not greenlight Q-041 \u2014 the three-row routing table ties it together. Review\
  \ by walking score \u2192 bin \u2192 count \u2192 compare on one email until the\
  \ steps feel automatic, then rehearse which ledger column moves first when Marcus\
  \ tags spam overnight. Tomorrow closes the Beta\u2013Binomial conjugacy proof with\
  \ computed credible endpoints and opens what breaks when the unknown becomes ten\
  \ thousand word weights instead of one folder rate."
